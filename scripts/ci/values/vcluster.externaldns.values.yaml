# Configure envoy or NGINX managed LoadBalancer Service to have the annotations
# for external DNS. Allows the host cluster to create the DNS entries without
# access to the Ingress or Gateway Routes.

global:
  gatewayApi:
    envoyProxySpec:
      provider:
        kubernetes:
          envoyService:
            annotations:
              external-dns.alpha.kubernetes.io/ttl: "10"
              external-dns.alpha.kubernetes.io/hostname: "kas${DOMAIN},minio${DOMAIN},registry${DOMAIN},gitlab${DOMAIN}"

nginx-ingress:
  controller:
    service:
      annotations:
        external-dns.alpha.kubernetes.io/ttl: "10"
        external-dns.alpha.kubernetes.io/hostname: "kas${DOMAIN},minio${DOMAIN},registry${DOMAIN},gitlab${DOMAIN}"