{{- $spec := .Values.global.gatewayApi.envoyClientTrafficPolicySpec }}
{{- if and .Values.global.gatewayApi.enabled .Values.global.gatewayApi.installEnvoy $spec }}
{{- if not $spec.targetRefs }}
{{-   $_ := set $spec "targetRefs" (list (include "gitlab.gatewayApi.gatewayRef" . | fromYaml)) -}}
{{- end }}
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: ClientTrafficPolicy
metadata:
  name: {{ .Release.Name }}-policy
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "gitlab.standardLabels" . | nindent 4 }}
    {{- include "gitlab.commonLabels" . | nindent 4 }}
spec:
  {{- $spec | toYaml | nindent 2 }}
{{- end }}