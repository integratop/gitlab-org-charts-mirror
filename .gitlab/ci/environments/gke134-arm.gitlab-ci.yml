include:
  - component: "gitlab.com/gitlab-org/quality/pipeline-common/allure-report@9.6.3"
    inputs:
      job_name: "e2e-test-gke134a"
      job_stage: "qa-report"
      gitlab_auth_token_variable_name: "DANGER_GITLAB_API_TOKEN"
      aws_access_key_id_variable_name: "QA_ALLURE_AWS_ACCESS_KEY_ID"
      aws_secret_access_key_variable_name: "QA_ALLURE_AWS_SECRET_ACCESS_KEY"
      allure_results_glob: "gitlab-qa-run-*/**/allure-results"
    rules:
      - if: '$CI_SERVER_HOST != "gitlab.com"'
        when: never
      - if: '$CI_PIPELINE_SOURCE == "pipeline" || $CI_PIPELINE_SOURCE == "parent_pipeline"'

.review_gke134a_common_vars: &review_gke134a_common_vars
  DNS_PROVIDER: "google"
  AGENT_NAME: "gke134-ci-cluster"
  KUBE_INGRESS_BASE_DOMAIN: "cloud-native-v134.helm-charts.win"
  KUBE_NAMESPACE: "helm-charts-win"
  DEPLOY_MULTIARCH: "true"

create_review_gke134a:
  stage: review
  image: ${BUSYBOX_IMAGE}
  variables:
    <<: *review_gke134a_common_vars
    GIT_STRATEGY: none
  script:
    - echo "Configuring gke134_review/a-$REVIEW_REF_PREFIX$CI_COMMIT_SHORT_SHA to automatically stop in $REVIEW_APPS_AUTO_STOP_IN."
  environment: &gke134a_environment
    name: &gke134a_name gke134_review/a-$REVIEW_REF_PREFIX$CI_COMMIT_SHORT_SHA
    url: https://gitlab-$CI_ENVIRONMENT_SLUG.$KUBE_INGRESS_BASE_DOMAIN
    on_stop: stop_review_gke134a
    auto_stop_in: $REVIEW_APPS_AUTO_STOP_IN
    action: start

review_gke134a:
  variables:
    <<: *review_gke134a_common_vars
  extends: .review_template
  environment:
    <<: *gke134a_environment
    action: access
  # initially allow arm64 failures
  allow_failure: true

stop_review_gke134a:
  variables:
    <<: *review_gke134a_common_vars
  extends: .stop_review_template
  # initially allow arm64 failures
  allow_failure: true
  environment:
    # name: gke134_review/a-$REVIEW_REF_PREFIX$CI_COMMIT_SHORT_SHA
    name: *gke134a_name
    action: stop

review_specs_gke134a:
  extends: .specs
  variables:
    <<: *review_gke134a_common_vars
    VARIABLES_FILE: "variables/review_gke134a"
    RSPEC_TAGS: type:feature
  # initially allow arm64 failures
  allow_failure: true
  environment:
    <<: *gke134a_environment
    action: access
  rules:
    - !reference [.rule:skip_if_no_cluster]
    - !reference [.specs, rules]
  needs: ["review_gke134a"]

qa_gke134a:
  extends: .qa_branch
  variables:
    VARIABLES_FILE: "variables/review_gke134a"
    TEST_SUITE: $QA_SANITY_SUITE_OPTIONS
  # initially allow arm64 failures
  allow_failure: true
  environment:
    <<: *gke134a_environment
    action: access
  needs:
    - review_gke134a
    - job: review_specs_gke134a
      artifacts: false

qa_gke134a_full_suite_manual_trigger:
  extends: .qa_full_suite_manual_trigger
  script: echo 'The job will trigger Full E2E suite against GKE134'

qa_gke134a_manual_full_suite:
  extends: .qa_branch
  parallel: 7
  variables:
    VARIABLES_FILE: "variables/review_gke134a"
    TEST_SUITE: $QA_FULL_SUITE_OPTIONS
  # initially allow arm64 failures
  allow_failure: true
  environment:
    <<: *gke134a_environment
    action: access
  needs: ["qa_gke134a_full_suite_manual_trigger"]
