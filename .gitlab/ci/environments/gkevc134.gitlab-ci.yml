include:
  - component: "gitlab.com/gitlab-org/quality/pipeline-common/allure-report@9.6.3"
    inputs:
      job_name: "e2e-test-gkevc134"
      job_stage: "qa-report"
      gitlab_auth_token_variable_name: "DANGER_GITLAB_API_TOKEN"
      aws_access_key_id_variable_name: "QA_ALLURE_AWS_ACCESS_KEY_ID"
      aws_secret_access_key_variable_name: "QA_ALLURE_AWS_SECRET_ACCESS_KEY"
      allure_results_glob: "gitlab-qa-run-*/**/allure-results"
    rules:
      - if: '$CI_SERVER_HOST != "gitlab.com"'
        when: never
      - if: '$CI_PIPELINE_SOURCE == "pipeline" || $CI_PIPELINE_SOURCE == "parent_pipeline"'

.review_gkevc134_common_vars: &review_gkevc134_common_vars
  VCLUSTER_K8S_VERSION: "v1.34.0"
  VCLUSTER_VERSION: "0.29.1"
  VCLUSTER_NAME: "vc134-${REVIEW_REF_PREFIX}${CI_COMMIT_SHORT_SHA}"
  HOST_SUFFIX: "${CI_ENVIRONMENT_SLUG}-vc134"
  # the VARIABLES_FILE value is from the CI_JOB_NAME of the review job
  VARIABLES_FILE: "variables/review_gkevc134"
  DOMAIN: "-${HOST_SUFFIX}.${KUBE_INGRESS_BASE_DOMAIN}"

create_review_gkevc134:
  stage: review
  image: ${BUSYBOX_IMAGE}
  variables:
    <<: *review_gkevc134_common_vars
    GIT_STRATEGY: none
  script:
    - echo "Configuring gkevc_review/$REVIEW_REF_PREFIX$CI_COMMIT_SHORT_SHA to automatically stop in $REVIEW_APPS_AUTO_STOP_IN."
  environment: &gkevc134_environment
    name: &gkevc134_name gkevc_review/$REVIEW_REF_PREFIX$CI_COMMIT_SHORT_SHA
    url: "https://gitlab${DOMAIN}"
    on_stop: stop_review_gkevc134
    auto_stop_in: $REVIEW_APPS_AUTO_STOP_IN
    action: start

review_gkevc134:
  variables:
    <<: *review_gkevc134_common_vars
  extends: .vcluster_review_template
  environment:
    <<: *gkevc134_environment
    action: access

stop_review_gkevc134:
  variables:
    <<: *review_gkevc134_common_vars
  extends: .stop_vcluster_review_template
  environment:
    name: *gkevc134_name
    action: stop

review_specs_gkevc134:
  extends: .vcluster_specs_template
  variables:
    <<: *review_gkevc134_common_vars
  environment:
    <<: *gkevc134_environment
    action: access
  needs: ['review_gkevc134']

qa_gkevc134:
  extends: .qa_branch
  variables:
    <<: *review_gkevc134_common_vars
    TEST_SUITE: $QA_SANITY_SUITE_OPTIONS
  environment:
    <<: *gkevc134_environment
    action: access
  needs:
    - review_gkevc134
    - job: review_specs_gkevc134
      artifacts: false

qa_gkevc134_full_suite_manual_trigger:
  extends: .qa_full_suite_manual_trigger
  script: echo 'The job will trigger Full E2E suite against GKE134 vcluster'

qa_gkevc134_manual_full_suite:
  extends: .qa_branch
  parallel: 7
  variables:
    <<: *review_gkevc134_common_vars
    TEST_SUITE: $QA_FULL_SUITE_OPTIONS
  environment:
    <<: *gkevc134_environment
    action: access
  needs: ["qa_gkevc134_full_suite_manual_trigger"]
